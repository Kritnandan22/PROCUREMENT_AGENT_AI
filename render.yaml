services:
  - type: web
    name: procurement-mcp-server
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MCP_HOST
        value: 0.0.0.0
      - key: ORACLE_CLIENT_PATH
        value: /opt/oracle/instantclient_21_15
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_SID
        sync: false
      - key: DB_SERVICE_NAME
        sync: false
      - key: APPS_USER
        sync: false
      - key: APPS_PASSWORD
        sync: false
